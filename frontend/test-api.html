<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testAPI()">Test Resume Analysis API</button>
    <div id="result" style="margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 5px;"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test 1: Check if server responds
                console.log('Test 1: Checking server...');
                let r = await fetch('http://127.0.0.1:5000/');
                console.log('Server response:', r.status);
                
                // Test 2: Check if API endpoint exists
                console.log('Test 2: Checking API endpoint...');
                r = await fetch('http://127.0.0.1:5000/api/resume/analyze', {method: 'OPTIONS'});
                console.log('API OPTIONS response:', r.status);
                
                // Test 3: Try actual upload
                console.log('Test 3: Testing file upload...');
                const formData = new FormData();
                const testFile = new File(['python java javascript'], 'test.txt', {type: 'text/plain'});
                formData.append('file', testFile);
                
                r = await fetch('http://127.0.0.1:5000/api/resume/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await r.json();
                console.log('Upload response:', r.status, data);
                
                resultDiv.innerHTML = `
                    <h2>✅ API Working!</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch(e) {
                console.error('Error:', e);
                resultDiv.innerHTML = `<h2>❌ Error</h2><pre>${e.message}</pre>`;
            }
        }
    </script>
</body>
</html>
