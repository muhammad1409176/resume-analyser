<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer - Live Debug</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; }
        h2 { color: #667eea; margin: 15px 0 10px 0; font-size: 1.2em; }
        input { padding: 10px; margin: 10px 0; width: 100%; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; cursor: pointer; border-radius: 4px; margin-right: 10px; }
        button:hover { background: #5568d3; }
        .log { background: #f9f9f9; padding: 15px; margin: 10px 0; border-left: 3px solid #667eea; font-family: monospace; font-size: 0.9em; max-height: 300px; overflow-y: auto; }
        .error { border-left-color: #dc3545; color: #dc3545; }
        .success { border-left-color: #28a745; color: #28a745; }
        .info { border-left-color: #17a2b8; color: #17a2b8; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .skill-badge { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 5px 10px; margin: 3px; border-radius: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Analyzer - Live Debug Console</h1>
        
        <div class="grid">
            <!-- Upload Section -->
            <div class="section">
                <h2>Upload Resume</h2>
                <input type="file" id="fileInput" accept=".txt,.pdf,.docx" />
                <button onclick="uploadResume()">Upload & Analyze</button>
                <div id="uploadLog" class="log info"></div>
            </div>
            
            <!-- API Response Section -->
            <div class="section">
                <h2>API Response</h2>
                <div id="responseLog" class="log"></div>
            </div>
        </div>
        
        <!-- Results Section -->
        <div class="section">
            <h2>Analysis Results</h2>
            <div id="results"></div>
        </div>
        
        <!-- Full Response -->
        <div class="section">
            <h2>Raw JSON Response</h2>
            <pre id="rawResponse">Waiting for upload...</pre>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://127.0.0.1:5000/api';
        
        function log(element, message, type = 'info') {
            const logDiv = document.getElementById(element);
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logDiv.innerHTML = `<div class="${className}">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
        }
        
        async function uploadResume() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                log('uploadLog', 'ERROR: No file selected', 'error');
                return;
            }
            
            log('uploadLog', `Selected file: ${file.name} (${(file.size/1024).toFixed(2)}KB)`, 'info');
            log('uploadLog', `Uploading to ${API_BASE}/resume/analyze...`, 'info');
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(API_BASE + '/resume/analyze', {
                    method: 'POST',
                    body: formData,
                    cache: 'no-store'
                });
                
                log('uploadLog', `API Response Status: ${response.status}`, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    const error = await response.text();
                    log('responseLog', `HTTP Error: ${error}`, 'error');
                    log('uploadLog', `HTTP Error: ${error}`, 'error');
                    return;
                }
                
                const data = await response.json();
                log('uploadLog', 'Response received & parsed', 'success');
                log('responseLog', `Status: OK`, 'success');
                
                // Display raw JSON
                document.getElementById('rawResponse').textContent = JSON.stringify(data, null, 2);
                
                // Display formatted results
                displayResults(data);
                
            } catch (e) {
                log('uploadLog', `ERROR: ${e.message}`, 'error');
                log('responseLog', `FETCH ERROR: ${e.message}`, 'error');
            }
        }
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            let html = '';
            
            // Score
            html += `<h3 style="color: #667eea;">Resume Score: ${(data.resume_score || 0).toFixed(1)}%</h3>`;
            
            // Skills
            const skills = data.detected_skills || [];
            html += `<h3 style="margin-top: 15px;">Skills Detected (${skills.length}):</h3>`;
            if (skills.length > 0) {
                skills.forEach(skill => {
                    html += `<span class="skill-badge">${skill}</span>`;
                });
            } else {
                html += '<p style="color: #999;">No skills detected</p>';
            }
            
            // Missing Skills
            const missing = data.missing_skills || [];
            html += `<h3 style="margin-top: 15px;">Missing Skills (${missing.length}):</h3>`;
            if (missing.length > 0) {
                missing.forEach(skill => {
                    html += `<span class="skill-badge" style="background: #ffebee; color: #c62828;">${skill}</span>`;
                });
            }
            
            // Recommendations
            const roles = data.recommended_roles || [];
            if (roles.length > 0) {
                html += `<h3 style="margin-top: 15px;">Recommended Roles:</h3>`;
                roles.forEach(role => {
                    html += `<div style="background: #f0f7ff; padding: 10px; margin: 10px 0; border-radius: 4px; border-left: 4px solid #667eea;">
                        <strong>${typeof role === 'string' ? role : role.role}</strong>
                    </div>`;
                });
            }
            
            resultsDiv.innerHTML = html;
            log('responseLog', 'Results displayed', 'success');
        }
    </script>
</body>
</html>
