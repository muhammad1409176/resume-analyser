<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-left: 3px solid #007bff; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        input[type="file"] { padding: 10px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume API Diagnostic Test</h1>
        
        <div>
            <h2>Upload Resume</h2>
            <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" />
            <button id="testBtn">Test API</button>
        </div>

        <div class="log" id="log">
            <div class="info">Logs will appear here...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5000/api';
        const logDiv = document.getElementById('log');

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type}]`, message);
        }

        document.getElementById('testBtn').addEventListener('click', async function() {
            addLog('Button clicked', 'info');
            
            const file = document.getElementById('resumeFile').files[0];
            if (!file) {
                addLog('No file selected', 'error');
                return;
            }

            addLog(`File selected: ${file.name}`, 'info');
            addLog(`File size: ${file.size} bytes`, 'info');
            
            const formData = new FormData();
            formData.append('file', file);

            addLog('Sending request to API...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/resume/analyze`, {
                    method: 'POST',
                    body: formData
                });

                addLog(`Response status: ${response.status}`, 'info');
                addLog(`Response headers: Content-Type = ${response.headers.get('content-type')}`, 'info');

                const data = await response.json();
                addLog(`Response received successfully!`, 'success');
                addLog(`Data keys: ${Object.keys(data).join(', ')}`, 'info');
                
                if (data.error) {
                    addLog(`Error from API: ${data.error}`, 'error');
                } else {
                    addLog(`Skills found: ${data.skills_found.join(', ')}`, 'success');
                    addLog(`Role recommendations: ${data.role_recommendations.length} roles`, 'success');
                    addLog(`Job matches: ${data.job_matches.length} jobs`, 'success');
                }
            } catch (error) {
                addLog(`Fetch failed: ${error.message}`, 'error');
                addLog(`Error details: ${error.stack}`, 'error');
            }
        });

        addLog('Script initialized', 'success');
    </script>
</body>
</html>
